# version: '3'

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper-1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka-1
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1 # unique id for the broker
      KAFKA_ZOOKEEPER_CONNECT: zookeeper-1:2181  # zookeeper address
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092 # what brokers use to listen for connections
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092  # what clients use to connect
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1 # how many replicas of the offset topic to have

  postgres:
    image: postgres:15
    container_name: airflow-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 5s
      retries: 5

  airflow-init:
    image: apache/airflow:2.9.3
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    command: >
      bash -c "
      airflow db migrate &&
      airflow users create --username admin --password admin --firstname admin --lastname user --role Admin --email admin@example.com
      "

  airflow-webserver:
    image: apache/airflow:2.9.3
    container_name: airflow-webserver
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    ports:
      - "8085:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      _PIP_ADDITIONAL_REQUIREMENTS: pandas pyarrow
    volumes:
      - ./dags:/opt/airflow/dags
      - ./output:/opt/airflow/output
    command: webserver

  airflow-scheduler:
    image: apache/airflow:2.9.3
    container_name: airflow-scheduler
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      _PIP_ADDITIONAL_REQUIREMENTS: pandas pyarrow
    volumes:
      - ./dags:/opt/airflow/dags
      - ./output:/opt/airflow/output
    command: scheduler

  dashboard:
    image: python:3.11-slim
    container_name: inventory-dashboard
    working_dir: /app
    ports:
      - "8501:8501"
    volumes:
      - ./dashboard:/app/dashboard
      - ./output:/app/output
    command: >
      bash -c "
      pip install --no-cache-dir streamlit pandas pyarrow &&
      streamlit run dashboard/app.py --server.address=0.0.0.0 --server.port=8501
      "